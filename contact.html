<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanis Tighouart - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="projets.html">Projets</a></li>
            <li><a href="veille.html">Veilles Techno</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <span class="tagline">Me contacter</span>
        <h1>Yanis Tighouart</h1>
        <h2>Étudiant en Administration Systèmes & Réseaux</h2>
    </header>

    <div class="container">
        <section class="contact-section" style="max-width: 700px; margin: 0 auto; padding-bottom: 5rem;">
            <form action="https://formspree.io/f/xnjlgkry" method="POST">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-dim);">Nom complet</label>
                    <input type="text" name="name" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(30, 41, 59, 0.5); color: white;">
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-dim);">Adresse email</label>
                    <input type="email" name="email" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(30, 41, 59, 0.5); color: white;">
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-dim);">Objet</label>
                    <input type="text" name="subject" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(30, 41, 59, 0.5); color: white;">
                </div>

                <div style="margin-bottom: 2rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-dim);">Message</label>
                    <textarea name="message" rows="6" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(30, 41, 59, 0.5); color: white; resize: vertical;"></textarea>
                </div>

                <button type="submit" class="btn-main" style="width: 100%; cursor: pointer; border: none;">Envoyer le message</button>
            </form>
        </section>
    </div>

</body>
</html>
