<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Yanis Tighouart</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Styles spécifiques pour centrer et embellir la page contact */
        .contact-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh; /* Prend une bonne partie de la hauteur de l'écran */
            text-align: center;
        }

        .contact-card {
            background: rgba(30, 41, 59, 0.7);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }

        .contact-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 2rem; /* Espacement demandé entre les boutons */
            margin-top: 2.5rem;
        }

        .btn-contact {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        /* Style bouton Email */
        .btn-email {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        /* Style bouton LinkedIn */
        .btn-linkedin {
            background: #0077b5;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 119, 181, 0.4);
        }

        /* Style bouton CV (Contour seulement) */
        .btn-cv {
            background: transparent;
            border: 2px solid #06b6d4;
            color: #06b6d4;
        }

        .btn-contact:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        
        .btn-cv:hover {
            background: rgba(6, 182, 212, 0.1);
            color: #fff;
        }

        /* Styles du formulaire */
        .contact-form {
            width: 100%;
            margin-top: 2rem;
            text-align: left;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #f1f5f9;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            color: white;
            border: none;
            cursor: pointer;
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(6, 182, 212, 0.3);
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="projets.html">Projets</a></li>
            <li><a href="veille.html">Veilles Techno</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <div class="container contact-wrapper">
        <div class="contact-card">
            <h1 style="margin-bottom: 1rem; color: #f1f5f9;">Me contacter</h1>
            <p style="color: #94a3b8; margin-bottom: 2rem;">
                Je suis actuellement à la recherche d'opportunités en alternance dans le domaine des systèmes et réseaux. N'hésitez pas à consulter mon CV ou à m'envoyer un message.
            </p>

            <!-- Formulaire de contact -->
            <form class="contact-form" action="#" method="POST">
                <div class="form-group">
                    <label for="name">Nom complet</label>
                    <input type="text" id="name" name="name" class="form-control" required placeholder="Votre nom">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" class="form-control" required placeholder="Votre message..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Envoyer le message</button>
            </form>

            <div class="contact-buttons">
                <!-- Bouton Email -->
                <a href="mailto:ton-email@exemple.com" class="btn-contact btn-email">
                    ✉️ Me contacter
                </a>

                <!-- Bouton LinkedIn -->
                <a href="www.linkedin.com/in/yanis-tighouart-2a8030354" target="_blank" class="btn-contact btn-linkedin">
                    👔 LinkedIn
                </a>

                <!-- Bouton CV (s'ouvre dans un nouvel onglet) -->
                <a href="cv.pdf" target="_blank" class="btn-contact btn-cv">
                    📄 Mon CV
                </a>
            </div>
        </div>
    </div>

</body>
</html>

</html>
