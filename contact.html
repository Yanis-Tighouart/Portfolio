<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Yanis Tighouart</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Styles spécifiques pour centrer et embellir la page contact */
        .contact-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh; /* Prend une bonne partie de la hauteur de l'écran */
            text-align: center;
        }

        .contact-card {
            background: rgba(30, 41, 59, 0.7);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }

        .contact-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 2rem; /* Espacement demandé entre les boutons */
            margin-top: 2.5rem;
        }

        .btn-contact {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        /* Style bouton Email */
        .btn-email {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        /* Style bouton LinkedIn */
        .btn-linkedin {
            background: #0077b5;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 119, 181, 0.4);
        }

        /* Style bouton CV (Contour seulement) */
        .btn-cv {
            background: transparent;
            border: 2px solid #06b6d4;
            color: #06b6d4;
        }

        .btn-contact:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        
        .btn-cv:hover {
            background: rgba(6, 182, 212, 0.1);
            color: #fff;
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="projets.html">Projets</a></li>
            <li><a href="veille.html">Veilles Techno</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <div class="container contact-wrapper">
        <div class="contact-card">
            <h1 style="margin-bottom: 1rem; color: #f1f5f9;">Restons en contact</h1>
            <p style="color: #94a3b8; margin-bottom: 2rem;">
                Je suis actuellement à la recherche d'opportunités en alternance ou en stage dans le domaine des systèmes et réseaux. N'hésitez pas à consulter mon CV ou à m'envoyer un message.
            </p>

            <div class="contact-buttons">
                <!-- Bouton Email -->
                <a href="mailto:ton-email@exemple.com" class="btn-contact btn-email">
                    ✉️ Me contacter
                </a>

                <!-- Bouton LinkedIn -->
                <a href="https://www.linkedin.com/" target="_blank" class="btn-contact btn-linkedin">
                    👔 LinkedIn
                </a>

                <!-- Bouton CV (s'ouvre dans un nouvel onglet) -->
                <a href="cv.pdf" target="_blank" class="btn-contact btn-cv">
                    📄 Mon CV
                </a>
            </div>
        </div>
    </div>

</body>
</html>
